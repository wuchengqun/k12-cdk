services:
  sub2api-picker:
    build: .
    container_name: sub2api-picker
    restart: unless-stopped
    ports:
      - "8978:8978"
    environment:
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin123456}
      FRONT_USERNAME: ${FRONT_USERNAME:-user}
      FRONT_PASSWORD: ${FRONT_PASSWORD:-user123456}
      APP_SECRET: ${APP_SECRET:-change-this-to-a-long-random-string}
      SUB2API_URL: ${SUB2API_URL:-}
      SUB2API_EMAIL: ${SUB2API_EMAIL:-}
      SUB2API_PASSWORD: ${SUB2API_PASSWORD:-}
      PAN123_ACCOUNT: ${PAN123_ACCOUNT:-}
      PAN123_PASSWORD: ${PAN123_PASSWORD:-}
      PAN123_TOKEN: ${PAN123_TOKEN:-}
      PAN123_COOKIE: ${PAN123_COOKIE:-}
      PAN123_LOGIN_UUID: ${PAN123_LOGIN_UUID:-}
      PAN123_PARENT_FILE_ID: ${PAN123_PARENT_FILE_ID:-0}
      PAN123_SHARE_DAYS: ${PAN123_SHARE_DAYS:-1}
      DB_PATH: /data/app.db
    volumes:
      - ./data:/data
